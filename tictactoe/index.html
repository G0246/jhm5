<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Basic meta tags for character set and responsive design -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <!-- Link to external stylesheet -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- Main container that holds all game elements -->
    <div class="container">
        <!-- Title Screen - shown first when game loads (active by default) -->
        <div id="titleScreen" class="screen active">
            <h1>Tic Tac Toe</h1>
            <!-- Logo showing a 3x3 grid of X and O symbols -->
            <div class="logo">
                <div class="logo-grid">
                    <span>X</span>
                    <span>O</span>
                    <span>X</span>
                    <span>O</span>
                    <span>X</span>
                    <span>O</span>
                    <span>O</span>
                    <span>X</span>
                    <span>O</span>
                </div>
            </div>

            <!-- Game mode selection buttons -->
            <div class="mode-select">
                <h2>Select Mode</h2>
                <button id="onePlayerBtn">1 Player</button>  <!-- Play against AI -->
                <button id="twoPlayerBtn">2 Players</button> <!-- Play against another person -->
            </div>
        </div>

        <!-- Game Screen - hidden initially, shown after selecting game mode -->
        <div id="gameScreen" class="screen">
            <h1>Tic Tac Toe</h1>

            <!-- Game board - will be populated by JavaScript with 9 cells -->
            <div id="gameBoard" class="board"></div>

            <!-- Status message area (shows current player, winner, etc.) -->
            <div id="status" class="status"></div>

            <!-- Control buttons -->
            <div class="controls">
                <button id="resetBtn">Restart</button> <!-- Restarts the current game -->
                <button id="backBtn">Back to Menu</button> <!-- Returns to title screen -->
            </div>
        </div>
    </div>
    <!-- Link to JavaScript file -->
    <script src="js/script.js"></script>
</body>
</html>
