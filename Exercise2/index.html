<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>待辦事項清單</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>我的待辦事項</h1>
            <p>保持有條理和高效率！</p>
        </header>

        <div class="input-section">
            <input type="text" id="taskInput" placeholder="新增一項任務..." maxlength="100">
            <button id="addBtn">新增任務</button>
        </div>

        <div class="filter-section">
            <button class="filter-btn active" data-filter="all">全部</button>
            <button class="filter-btn" data-filter="pending">待辦</button>
            <button class="filter-btn" data-filter="completed">已完成</button>
        </div>

        <div class="task-stats">
            總共 <span id="totalTasks">0</span> 項任務，
            已完成 <span id="completedTasks">0</span> 項
        </div>

        <ul id="taskList" class="task-list">
            <!-- Tasks will be dynamically added here -->
        </ul>

        <div class="actions">
            <button id="clearCompleted">清除已完成</button>
            <button id="clearAll">清除全部</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
